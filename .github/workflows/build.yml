name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          path: /opt/android-sdk

      - name: Download Gradle
        run: |
          mkdir -p /opt/gradle
          curl -sL https://mirrors.cloud.tencent.com/gradle/gradle-8.2-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          ls /opt/gradle/

      - name: Build Debug APK
        run: |
          export PATH=/opt/gradle/gradle-8.2/bin:$PATH
          echo "Gradle version: $(gradle --version)"
          cd PetDesk
          gradle assembleDebug --no-daemon --warning-mode=all 2>&1 | head -100

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pet-desk-apk
          path: PetDesk/app/build/outputs/apk/debug/app-debug.apk