name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Debug env
        run: |
          echo "=== Java ==="
          java -version 2>&1
          echo "=== JAVA_HOME ==="
          echo $JAVA_HOME
          echo "=== Android SDK ==="
          echo $ANDROID_HOME
          ls -la $ANDROID_HOME 2>/dev/null || echo "ANDROID_HOME not found"
          ls -la /opt/android-sdk 2>/dev/null || echo "/opt/android-sdk not found"
          echo "=== Which gradle ==="
          which gradle || echo "gradle not in PATH"
          echo "=== GitHub workspace ==="
          ls -la /github/workspace 2>/dev/null
          ls -la $(pwd) 2>/dev/null

      - name: Download Gradle directly
        run: |
          echo "=== Downloading Gradle ==="
          curl -sL -o gradle.zip "https://mirrors.cloud.tencent.com/gradle/gradle-8.2-bin.zip"
          unzip -oq gradle.zip
          ls -la gradle-8.2/bin/gradle
          ./gradle-8.2/bin/gradle --version

      - name: Build APK
        run: |
          cd PetDesk
          ls -la
          ls -la app/src/main/
          echo "=== Building with local Gradle ==="
          ../gradle-8.2/bin/gradle assembleDebug --no-daemon --stacktrace 2>&1 | tail -200

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pet-desk-apk
          path: PetDesk/app/build/outputs/apk/debug/app-debug.apk