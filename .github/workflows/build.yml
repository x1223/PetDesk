name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Fix Gradle wrapper
        run: |
          cd PetDesk
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd PetDesk
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 || true
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK not found"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pet-desk-apk
          path: PetDesk/app/build/outputs/apk/debug/app-debug.apk