name: Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - uses: android-actions/setup-android@v2
      - name: Setup Gradle
        run: |
          pwd && ls -la
          curl -sL -o gradle.zip "https://mirrors.cloud.tencent.com/gradle/gradle-8.2-bin.zip"
          unzip -oq gradle.zip
          ls -la gradle-8.2/bin/
          ./gradle-8.2/bin/gradle --version
      - name: Build with Gradle
        run: |
          pwd && ls -la
          ./gradle-8.2/bin/gradle -v 2>&1 | head -10
          ./gradle-8.2/bin/gradle assembleDebug --no-daemon 2>&1 | tee /tmp/build.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "EXIT CODE: $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Build failed with exit code $EXIT_CODE"
            exit 1
          fi
      - name: Debug build output
        run: |
          echo "=== APK Location ==="
          find . -name "*.apk" -type f 2>/dev/null
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK dir not found"
          ls -la app/build/outputs/ 2>/dev/null || echo "outputs dir not found"
          ls -la app/build/ 2>/dev/null || echo "build dir not found"
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: apk
          path: app/build/outputs/apk/debug/app-debug.apk