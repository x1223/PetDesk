name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Build Debug APK
        id: build
        run: |
          cd PetDesk
          ls -la gradlew
          head -5 gradlew
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tee build.log
          cat build.log
          echo "---APK CHECK---"
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No APK dir"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pet-desk-apk
          path: PetDesk/app/build/outputs/apk/debug/app-debug.apk