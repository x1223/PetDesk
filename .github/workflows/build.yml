name: Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - uses: android-actions/setup-android@v2
      - name: Setup Gradle
        run: |
          curl -sL -o gradle.zip "https://mirrors.cloud.tencent.com/gradle/gradle-8.2-bin.zip"
          unzip -oq gradle.zip
      - name: Build with Gradle
        run: |
          ./gradle-8.2/bin/gradle -v 2>&1 | head -10
          cd PetDesk && ../gradle-8.2/bin/gradle assembleDebug --no-daemon 2>&1 | tee /tmp/build.log
          echo "EXIT CODE: $?"
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: apk
          path: PetDesk/app/build/outputs/apk/debug/app-debug.apk