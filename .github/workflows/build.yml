name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Download Gradle
        run: |
          curl -sL https://mirrors.cloud.tencent.com/gradle/gradle-8.2-bin.zip -o gradle.zip
          unzip -oq gradle.zip
          ls gradle-8.2/bin/

      - name: Build
        run: |
          cd PetDesk
          ../gradle-8.2/bin/gradle assembleDebug --no-daemon --no-build-cache --rerun-tasks 2>&1

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pet-desk-apk
          path: PetDesk/app/build/outputs/apk/debug/app-debug.apk