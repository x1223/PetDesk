name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_HOME: /opt/gradle/gradle-8.2
      PATH: /opt/gradle/gradle-8.2/bin:/opt/android-sdk/cmdline-tools/latest/bin:/opt/android-sdk/platform-tools:/usr/bin:/bin:$PATH
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          path: /opt/android-sdk

      - name: Download and setup Gradle
        run: |
          curl -sL https://mirrors.cloud.tencent.com/gradle/gradle-8.2-bin.zip -o /tmp/gradle.zip
          unzip -oq /tmp/gradle.zip -d /opt/gradle
          ls -la /opt/gradle/
          /opt/gradle/gradle-8.2/bin/gradle --version

      - name: Build Debug APK
        run: |
          cd PetDesk
          /opt/gradle/gradle-8.2/bin/gradle assembleDebug --no-daemon 2>&1

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pet-desk-apk
          path: PetDesk/app/build/outputs/apk/debug/app-debug.apk